<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gioia Mundo — Street Art Origins</title>
  <meta name="description" content="Discover the birthplace of your Gioia Mundo street art piece." />
  <meta name="color-scheme" content="dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#090a0f;
      --text:#f6f7fb;
      --muted:#aeb6cf;
      --line:#252b42;
      --card:rgba(17,20,31,.78);
      --glass:rgba(0,0,0,.34);
      --shadow:0 24px 80px rgba(0,0,0,.38);
      --glow:0 12px 40px rgba(124,92,255,.22);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --radius-pill:999px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 15% 8%, rgba(124,92,255,.18), transparent 60%),
        radial-gradient(700px 500px at 92% 18%, rgba(46,229,157,.10), transparent 58%),
        linear-gradient(180deg,#07080d 0%, #090a0f 100%);
      min-height:100vh;
    }

    img, iframe{
      display:block;
      max-width:100%;
    }

    a{color:inherit}

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:28px;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1.05fr) minmax(360px,.95fr);
      gap:22px;
      align-items:start;
    }

    @media (max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      overflow:hidden;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
    }

    /* LEFT */
    .mapCard{
      padding:14px;
    }

    .map{
      position:relative;
      height:580px;
      border-radius:var(--radius-lg);
      overflow:hidden;
      background:#111;
      border:1px solid rgba(255,255,255,.05);
    }

    @media (max-width:680px){
      .map{
        height:430px;
      }
    }

    .map iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }

    .mapOverlay{
      position:absolute;
      top:14px;
      left:14px;
      right:14px;
      z-index:2;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      pointer-events:none;
    }

    @media (max-width:680px){
      .mapOverlay{
        flex-direction:column;
        align-items:stretch;
      }
    }

    .badge,
    .btn{
      pointer-events:auto;
      border-radius:var(--radius-pill);
      backdrop-filter:blur(10px);
      font-weight:800;
      font-size:13px;
      line-height:1.2;
    }

    .badge{
      padding:10px 14px;
      background:var(--glass);
      border:1px solid rgba(255,255,255,.13);
      max-width:78%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 14px;
      text-decoration:none;
      color:var(--text);
      background:rgba(0,0,0,.36);
      border:1px solid rgba(255,255,255,.16);
      transition:transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .btn:hover,
    .btn:focus-visible{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.30);
      background:rgba(0,0,0,.48);
      outline:none;
    }

    .mapFooter{
      margin-top:14px;
      display:flex;
      justify-content:center;
    }
